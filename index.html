<html>
    <head>
        <title>Wordle clone for funzies</title>
        <script src="main.js"></script>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <input
          id="mobile-input"
          type="text"
          maxlength="1"
          inputmode="text"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          style="position:absolute; opacity:0; left:-9999px;"
        ></input>
        <div id="main-container">
            <div id="the-number"></div>
            <div id="grid-container"></div>
        </div>
        <div id="answer"></div>
        <button id="reset" hidden>Reset</button>
    </body>
</html>
